name: Build

on: [push, pull_request, merge_group]

jobs:
  build:
    name: JDK ${{ matrix.java_version }}
    runs-on: macos-latest

    strategy:
      matrix:
        java_version: [17]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Gradle Wrapper Validation
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup gradle
        uses: gradle/gradle-build-action@v3

      - name: Install JDK ${{ matrix.java_version }}
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.java_version }}

      - name: Test spawn standalone iOS 26.2
        timeout-minutes: 2
        run: xcrun simctl spawn --standalone CB3DAAF1-A853-4818-BFF6-1CE5393DBEE7 /usr/bin/true && echo "OK 26.2"

      - name: Test spawn standalone iOS 26.1
        timeout-minutes: 2
        run: xcrun simctl spawn --standalone 3C8FC54B-47D7-4289-95E1-693973B7FFB7 /usr/bin/true && echo "OK 26.1"

      - name: Show available simulators
        run: xcrun simctl list runtimes

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Show available runtimes
        run: xcrun simctl list runtimes

      - name: Run iOS Simulator Arm64 Tests
        run: ./gradlew iosSimulatorArm64Test --info

      - name: Show Gradle daemon log
        if: always()
        run: find ~/.gradle/daemon -name "*.out.log" -newer /tmp/gradle_start_marker -exec tail -5000 {} + || echo "no daemon log found"

      - name: Show CoreSimulator log
        if: always()
        run: tail -2000 ~/Library/Logs/CoreSimulator/CoreSimulator.log || echo "no log"

      - name: Upload CoreSimulator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coresimulator-log
          path: ~/Library/Logs/CoreSimulator/CoreSimulator.log
