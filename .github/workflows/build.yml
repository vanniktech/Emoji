name: Build

on:
  push:
    branches:
      - KT-84975-hanging

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Create diagnostics dir
        run: mkdir -p diagnostics

      - name: Run iOS Simulator Arm64 Tests
        timeout-minutes: 20
        run: |
          ./gradlew :emoji:iosSimulatorArm64Test \
            --no-daemon \
            --stacktrace \
            --debug \
            --console=plain \
            > diagnostics/gradle.log 2>&1

      - name: Show short diagnostics
        if: failure() || cancelled()
        run: |
          ps -eo pid,ppid,%cpu,%mem,stat,etime,command > diagnostics/processes.txt
          jps -lv > diagnostics/jps.txt || true

      - name: Save thread dumps
        if: failure() || cancelled()
        run: |
          : > diagnostics/jstack.txt
          for pid in $(jps | awk '{print $1}'); do
            echo "--- jstack $pid ---" >> diagnostics/jstack.txt
            jstack "$pid" >> diagnostics/jstack.txt 2>&1 || true
          done

      - name: Sample hanging processes
        if: failure() || cancelled()
        run: |
          TEST_PID="$(ps -eo pid=,command= | grep 'emoji/build/bin/iosSimulatorArm64/debugTest/test.kexe' | grep -v grep | awk 'NR==1{print $1}')"
          SIMCTL_PID="$(ps -eo pid=,command= | grep 'simctl spawn --standalone' | grep 'test.kexe' | grep -v grep | awk 'NR==1{print $1}')"

          {
            echo "TEST_PID=$TEST_PID"
            echo "SIMCTL_PID=$SIMCTL_PID"
          } > diagnostics/pids.txt

          if [ -n "$TEST_PID" ]; then
            sample "$TEST_PID" 10 1 -file diagnostics/test-kexe-sample.txt || true
          fi

          if [ -n "$SIMCTL_PID" ]; then
            sample "$SIMCTL_PID" 10 1 -file diagnostics/simctl-sample.txt || true
          fi

      - name: Save CoreSimulator log
        if: always()
        run: |
          tail -2000 ~/Library/Logs/CoreSimulator/CoreSimulator.log > diagnostics/CoreSimulator.log || echo "no log" > diagnostics/CoreSimulator.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-diagnostics
          path: diagnostics